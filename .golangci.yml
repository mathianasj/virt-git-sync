run:
  timeout: 5m
  allow-parallel-runners: true

issues:
  # don't skip warning about doc comments
  # don't exclude the default set of lint
  exclude-use-default: false
  # restore some of the defaults
  # (fill in the rest as needed)
  exclude-rules:
    - path: "api/*"
      linters:
        - lll
    - path: "internal/*"
      linters:
        - dupl
        - lll
linters:
  disable-all: true
  enable:
    # Code quality
    - dupl
    - goconst
    - gocritic
    - gocyclo
    - nakedret
    - prealloc
    - unconvert
    - unparam

    # Bug detection
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Style
    - gofmt
    - goimports
    - gosimple
    - misspell
    - nolintlint
    - revive

    # Testing
    - ginkgolinter

    # Type checking
    - typecheck

    # Line length
    - lll

    # Note: exportloopref deprecated since Go 1.22 (loopvar built into language)

linters-settings:
  revive:
    rules:
      - name: comment-spacings
