---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: applications.argoproj.io
spec:
  group: argoproj.io
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Namespaced
  versions:
  - name: types
    schema:
      openAPIV3Schema:
        description: Application is the definition of an ArgoCD Application resource
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationSpec is the specification of an Application
            properties:
              destination:
                description: Destination is the target cluster and namespace to deploy
                  to
                properties:
                  namespace:
                    description: Namespace is the target namespace
                    type: string
                  server:
                    description: Server is the Kubernetes cluster API URL
                    type: string
                type: object
              ignoreDifferences:
                description: IgnoreDifferences is a list of resources and fields which
                  should be ignored during comparison
                items:
                  description: ResourceIgnoreDifferences contains resource filter
                    and list of json paths which should be ignored during comparison
                  properties:
                    group:
                      description: Group is the Kubernetes API group
                      type: string
                    jsonPointers:
                      description: JSONPointers are JSON pointers to fields to ignore
                        (RFC6902 format)
                      items:
                        type: string
                      type: array
                    kind:
                      description: Kind is the Kubernetes resource kind
                      type: string
                    name:
                      description: Name is the resource name (optional, applies to
                        all if empty)
                      type: string
                    namespace:
                      description: Namespace is the resource namespace (optional)
                      type: string
                  required:
                  - kind
                  type: object
                type: array
              project:
                description: Project is the ArgoCD project name
                type: string
              source:
