apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay - use this for local development and testing
# Usage: kustomize build config/dev

resources:
- ../default

images:
- name: controller
  newName: quay.io/mathianasj/virt-git-sync
  newTag: dev

# For dev builds with mutable tags, always pull to avoid cached images
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: controller-manager
      namespace: system
    spec:
      template:
        spec:
          containers:
          - name: manager
            imagePullPolicy: Always
  target:
    kind: Deployment
    name: controller-manager
