  description: |
    # VirtGitSync Operator

    The VirtGitSync operator automates the deployment and management of git repository
    synchronization workloads within Kubernetes and OpenShift clusters.

    ## Features

    - Automatic injection of git-sync sidecar containers
    - Support for public and private repositories (HTTPS and SSH authentication)
    - Configurable sync intervals
    - Automatic deployment updates on git changes (optional)
    - Status tracking with commit SHA and sync timestamps

    ## Use Cases

    - Serving static websites from git repositories
    - Configuration management from git
    - Continuous deployment of content
    - GitOps workflows

    ## Getting Started

    Create a VirtGitSync resource to sync a git repository:

    ```yaml
    apiVersion: virt.mathianasj.github.com/v1alpha1
    kind: VirtGitSync
    metadata:
      name: my-git-sync
    spec:
      gitRepository:
        url: https://github.com/kubernetes/examples.git
        branch: master
        depth: 1
      syncInterval: 60s
      deployment:
        replicas: 1
        template:
          containers:
          - name: nginx
            image: nginx:latest
    ```

    The operator will create a deployment with your application containers and
    automatically inject a git-sync sidecar that keeps the repository synchronized.
