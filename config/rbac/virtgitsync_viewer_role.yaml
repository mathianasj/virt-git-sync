# permissions for end users to view virtgitsyncs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: virt-git-sync
    app.kubernetes.io/managed-by: kustomize
  name: virtgitsync-viewer-role
rules:
- apiGroups:
  - virt.mathianasj.github.com
  resources:
  - virtgitsyncs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - virt.mathianasj.github.com
  resources:
  - virtgitsyncs/status
  verbs:
  - get
